<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:style="|--bg-color: ivory|">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" th:href="@{/comments.css}">
        <title>Comments CalOfficials</title>
    </head>
    <body>
        <div th:replace="~{fragments/menu :: menu('lemonChiffon', 'goldenRod',  'burlywood','goldenRod')}"></div>
        <div id="container" >
        <h1 th:text="${message}"></h1>
        <form action="/comments" method="post" style="margin-bottom: 20px;">
            <input id="username" type="text" name="username" placeholder="Enter username" class="input">
            <input id="message" type="text" name="message" placeholder="Enter message" required class="input">
            <button type="submit" th:style="|--button-color: lemonChiffon; --button-border-color: goldenRod;|">Post</button>
        </form>

        <div class="card-container">
            <div th:if="${comments != null and !comments.isEmpty()}"
                 th:each="comment : ${comments}" class="commentCard">
                <h3 th:text="'@' + ${comment.username}"></h3>
                <p th:text="${comment.message}"></p>
            </div>

            <div th:if="${comments == null or comments.isEmpty()}" class="commentCard">
                <h3>@anonymous</h3>
                <p>No comments yet. Be the first to post one.</p>
            </div>
        </div>
        </div>
    </body>
</html>
